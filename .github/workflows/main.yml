name: فحص سعر SOL تلقائي

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: إعداد بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: تثبيت requests
        run: pip install requests
      - name: تشغيل فحص السعر
        run: python check_price.py
