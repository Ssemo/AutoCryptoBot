name: فحص سعر SOL كل ساعة

on:
  schedule:
    - cron: '0 * * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: إعداد بايثون
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: تثبيت المكتبات
        run: pip install requests
      - name: تشغيل السكريبت
        run: python check_price.py
        
